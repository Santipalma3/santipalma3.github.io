<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* INTRO CARTA */
#inicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.carta {
    background: white;
    color: #ff4d6d;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* CONTENIDO */
.contenedor {
    padding: 20px;
}

/* FRASE */
#frase {
    margin-top: 10px;
}

/* GALERIA */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 20px;
    padding: 10px;
}

.galeria img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    cursor: pointer;
}

.galeria img:hover {
    transform: scale(1.05);
}

/* MODAL */
#modal {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
}

/* BOTONES */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

/* CORAZONES */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* FLORES */
.flower {
    position: fixed;
    top: -10px;
    animation: fall 4s linear;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- CARTA INICIO -->
<div id="inicio">
    <div class="carta">
        <h2>💌 Toca para entrar</h2>
        <button onclick="abrirPagina()">Abrir</button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

    <h1>Para Ti 💖</h1>

    <h2 id="frase">Te amo ❤️</h2>

    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <!-- BOTÓN MÚSICA -->
    <button onclick="document.getElementById('musica').play()">
        🎵 Reproducir música
    </button>

    <!-- GALERÍA -->
    <div class="galeria">

        <img src="fotos/IMG-20260419-WA0020.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0021.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0022.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0023.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0024.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0025.jpg" onclick="abrir(this)">

    </div>

</div>

<!-- MODAL -->
<div id="modal" onclick="cerrar()">
    <img id="imgModal">
</div>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function abrirPagina() {
    document.getElementById("inicio").style.display = "none";
}

function abrir(img) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imgModal").src = img.src;
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}

/* FRASES */
const frases = [
"Te amo ❤️",
"Eres mi todo 💕",
"Siempre contigo ❤️",
"No hay nadie como tú 💖"
];

let i = 0;

setInterval(() => {
    i = (i + 1) % frases.length;
    document.getElementById("frase").innerText = frases[i];
}, 3000);

/* CORAZONES */
function crearCorazon() {
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}
setInterval(crearCorazon, 300);

/* FLORES */
function crearFlor() {
    const f = document.createElement("div");
    f.classList.add("flower");
    f.innerHTML = "🌸";
    f.style.left = Math.random() * 100 + "vw";
    f.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 4000);
}
setInterval(crearFlor, 500);

</script>

</body>
</html>
