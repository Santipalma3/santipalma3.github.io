<<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* Contenedor */
.contenedor {
    padding: 20px;
    animation: fade 2s ease-in-out;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Título */
h1 {
    margin-top: 10px;
}

/* Galería */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 20px;
    padding: 10px;
}

.galeria img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    cursor: pointer;
}

.galeria img:hover {
    transform: scale(1.05);
}

/* Zoom modal */
#modal {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

#modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
}

/* Botón */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Corazones */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear infinite;
    font-size: 20px;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="contenedor">

    <h1>Para Ti 💖</h1>
    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <!-- GALERÍA -->
    <div class="galeria">

        <img src="fotos/IMG-20260419-WA0020.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0021.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0022.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0023.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0024.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0025.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0026.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0027.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0028.jpg" onclick="abrir(this)">
        <img src="fotos/IMG-20260419-WA0029.jpg" onclick="abrir(this)">

    </div>

    <p>Te amo muchísimo ❤️</p>

    <button onclick="mensaje()">Tócame 💌</button>

    <br><br>

    <button onclick="document.getElementById('musica').play()">
        🎵 Reproducir música
    </button>

</div>

<!-- MODAL ZOOM -->
<div id="modal" onclick="cerrar()">
    <img id="imgModal">
</div>

<!-- MÚSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function mensaje() {
    alert("Eres lo mejor que tengo 💕");
}

/* Zoom imágenes */
function abrir(img) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imgModal").src = img.src;
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}

/* Corazones animados */
function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (2 + Math.random() * 3) + "s";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
