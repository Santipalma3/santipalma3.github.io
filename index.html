<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
}

.contenedor {
    padding: 20px;
    animation: fade 2s;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

img {
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4d6d;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="contenedor">
    <h1>Para Ti 💖</h1>
    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <img src="fotos/foto1.jpg">

    <p>Te amo muchísimo ❤️</p>

    <button onclick="mensaje()">Tócame 💌</button>
</div>

<audio autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function mensaje() {
    alert("Eres lo mejor que tengo 💕");
}
</script>

</body>
</html>
