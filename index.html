<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
}

/* Contenedor principal */
.contenedor {
    padding: 20px;
    animation: fade 2s ease-in-out;
}

/* Animación de entrada */
@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Título */
h1 {
    margin-top: 10px;
}

/* Galería */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 20px;
    padding: 10px;
}

.galeria img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

.galeria img:hover {
    transform: scale(1.05);
}

/* Botón */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Texto */
p {
    font-size: 18px;
}

</style>
</head>

<body>

<div class="contenedor">

    <h1>Para Ti 💖</h1>

    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <!-- GALERÍA DE FOTOS -->
    <div class="galeria">

        <img src="fotos/IMG-20260419-WA0020.jpg">
        <img src="fotos/IMG-20260419-WA0021.jpg">
        <img src="fotos/IMG-20260419-WA0022.jpg">

        <img src="fotos/IMG-20260419-WA0024.jpg">
        <img src="fotos/IMG-20260419-WA0025.jpg">
        <img src="fotos/IMG-20260419-WA0026.jpg">
        <img src="fotos/IMG-20260419-WA0027.jpg">
        <img src="fotos/IMG-20260419-WA0028.jpg">
        <img src="fotos/IMG-20260419-WA0029.jpg">
        <img src="fotos/IMG-20260419-WA0030.jpg">
        <img src="fotos/IMG-20260419-WA0031.jpg">
        <img src="fotos/IMG-20260419-WA0032.jpg">
        <img src="fotos/IMG-20260419-WA0033.jpg">

    </div>

    <p>Te amo muchísimo ❤️</p>
