<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* 💌 CARTA INICIO */
#inicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.carta {
    background: white;
    color: #ff4d6d;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* CONTENIDO */
.contenedor {
    padding: 20px;
}

/* FRASES */
#frase {
    margin-top: 10px;
}

/* 🎞 SLIDER */
.slider {
    margin-top: 20px;
}

.slider img {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    transition: opacity 0.8s ease-in-out;
}

/* BOTONES */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

/* MODAL ZOOM */
#modal {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
}

/* ❤️ CORAZONES */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* 🌸 FLORES */
.flower {
    position: fixed;
    top: -10px;
    animation: fall 4s linear;
}

/* fade simple */
.fade {
    opacity: 0;
}
</style>
</head>

<body>

<!-- 💌 CARTA -->
<div id="inicio">
    <div class="carta">
        <h2>💌 Toca para entrar</h2>
        <button onclick="abrirPagina()">Abrir</button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

    <h1>Para Ti 💖</h1>

    <h2 id="frase">Te amo ❤️</h2>

    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <button onclick="document.getElementById('musica').play()">
        🎵 Reproducir música
    </button>

    <!-- 🎞 SLIDESHOW -->
    <div class="slider">
        <img id="slide" src="fotos/IMG-20260419-WA0020.jpg">
    </div>

</div>

<!-- MODAL -->
<div id="modal" onclick="cerrar()">
    <img id="imgModal">
</div>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* abrir carta */
function abrirPagina() {
    document.getElementById("inicio").style.display = "none";
}

/* frases */
const frases = [
"Te amo ❤️",
"Eres mi todo 💕",
"Siempre contigo ❤️",
"No hay nadie como tú 💖"
];

let f = 0;
setInterval(() => {
    f = (f + 1) % frases.length;
    document.getElementById("frase").innerText = frases[f];
}, 3000);

/* SLIDER */
const fotos = [
"fotos/IMG-20260419-WA0020.jpg",
"fotos/IMG-20260419-WA0021.jpg",
"fotos/IMG-20260419-WA0022.jpg",
"fotos/IMG-20260419-WA0023.jpg",
"fotos/IMG-20260419-WA0024.jpg",
"fotos/IMG-20260419-WA0025.jpg",
"fotos/IMG-20260419-WA0026.jpg",
"fotos/IMG-20260419-WA0027.jpg",
"fotos/IMG-20260419-WA0028.jpg",
"fotos/IMG-20260419-WA0029.jpg"
];

let i = 0;
const slide = document.getElementById("slide");

setInterval(() => {
    slide.classList.add("fade");

    setTimeout(() => {
        i = (i + 1) % fotos.length;
        slide.src = fotos[i];
        slide.classList.remove("fade");
    }, 400);

}, 3000);

/* corazones */
function crearCorazon() {
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}
setInterval(crearCorazon, 300);

/* flores */
function crearFlor() {
    const f = document.createElement("div");
    f.classList.add("flower");
    f.innerHTML = "🌸";
    f.style.left = Math.random() * 100 + "vw";
    f.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 4000);
}
setInterval(crearFlor, 500);

</script>

</body>
</html>
