<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mi Amor ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* 💌 CARTA */
#inicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.carta {
    background: white;
    color: #ff4d6d;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* CONTENIDO */
.contenedor {
    padding: 20px;
}

/* FRASES */
#frase {
    margin-top: 10px;
}

/* 📸 GALERÍA */
.galeria {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.galeria img {
    width: 90%;
    max-width: 400px;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    animation: aparecer 0.8s ease;
}

@keyframes aparecer {
    from {opacity: 0; transform: scale(0.7);}
    to {opacity: 1; transform: scale(1);}
}

/* BOTÓN */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

/* ❤️ CORAZONES */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* 🌸 FLORES */
.flower {
    position: fixed;
    top: -10px;
    animation: fall 4s linear;
}
</style>
</head>

<body>

<!-- 💌 CARTA -->
<div id="inicio">
    <div class="carta">
        <h2>💌 Toca para entrar</h2>
        <button onclick="abrirPagina()">Abrir</button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

    <h1>Para Ti 💖</h1>

    <h2 id="frase">Te amo ❤️</h2>

    <p>Desde que llegaste a mi vida todo es mejor...</p>

    <audio id="musica" loop>
        <source src="Tiamu.mp3" type="audio/mpeg">
    </audio>

    <div class="galeria" id="galeria"></div>

</div>

<script>

/* 💌 FIX DEFINITIVO DE CARTA */
function abrirPagina() {
    const carta = document.getElementById("inicio");
    if (carta) carta.style.display = "none";

    const audio = document.getElementById("musica");
    if (audio) {
        audio.play().catch(() => {
            console.log("Autoplay bloqueado, pero listo para tocar");
        });
    }
}

/* FRASES */
const frases = [
"Te amo ❤️",
"Eres mi todo 💕",
"Siempre contigo ❤️",
"No hay nadie como tú 💖"
];

let f = 0;
setInterval(() => {
    f = (f + 1) % frases.length;
    document.getElementById("frase").innerText = frases[f];
}, 3000);

/* FOTOS */
const fotos = [
"fotos/IMG-20260419-WA0020.jpg",
"fotos/IMG-20260419-WA0021.jpg",
"fotos/IMG-20260419-WA0022.jpg",
"fotos/IMG-20260419-WA0023.jpg",
"fotos/IMG-20260419-WA0024.jpg",
"fotos/IMG-20260419-WA0025.jpg",
"fotos/IMG-20260419-WA0026.jpg",
"fotos/IMG-20260419-WA0027.jpg",
"fotos/IMG-20260419-WA0028.jpg",
"fotos/IMG-20260419-WA0029.jpg"
];

let i = 0;

function agregarFoto() {
    if (i >= fotos.length) return;

    const img = document.createElement("img");
    img.src = fotos[i];

    document.getElementById("galeria").appendChild(img);

    i++;
}

setInterval(agregarFoto, 1500);

</script>

</body>
</html>
